services:
  postgres: 
    image: postgres:16-alpine
    container_name: staff_db
    environment:
      POSTGRES_USER: staffuser
      POSTGRES_PASSWORD: StaffPass123!
      POSTGRES_DB: StaffManagementDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staffuser -d StaffManagementDb"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  api:
    build:
      context: .
      dockerfile: StaffManagement.WebAPI/Dockerfile
    container_name: staff_api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE=Development
      - ConnectionStrings_DefaultConnection=Host=postgres;Port=5432;Database=StaffManagementDb;Username=staffuser;Password=StaffPass123!
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  
volumes:
  postgres_data: