version: '3.8'

services:
  postgres: 
    image: postgres:16-alpine
    container_name: staff_db
    environment:
      POSTGRES_USER: staffuser
      POSTGRES_PASSWORD: StaffPass123!
      POSTGRES_DB: StaffManagementDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  
volumes:
  postgres_data: